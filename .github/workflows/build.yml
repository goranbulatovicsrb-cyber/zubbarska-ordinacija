name: Build DentaPro Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Qt6 MSVC
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: false

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        shell: cmd
        run: cmake -B build -S . -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: cmd
        run: |
          cd build
          nmake

      - name: Deploy
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "pkg"
          Copy-Item "build\DentaPro.exe" "pkg\"

          windeployqt --release --no-translations --sql "pkg\DentaPro.exe"

          # Ensure sqldrivers folder has qsqlite.dll
          $dest = "pkg\sqldrivers"
          New-Item -ItemType Directory -Force -Path $dest

          $found = Get-ChildItem -Path "$env:RUNNER_TOOL_CACHE" -Recurse -Filter "qsqlite.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $found) {
            $found = Get-ChildItem -Path "C:\Qt" -Recurse -Filter "qsqlite.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $found) {
            Write-Host "Found qsqlite.dll: $($found.FullName)"
            Copy-Item $found.FullName $dest -Force
          }

          Write-Host "=== Package contents ==="
          Get-ChildItem "pkg" -Recurse | Select-Object FullName

      - name: Zip
        shell: powershell
        run: |
          Compress-Archive -Path "pkg\*" -DestinationPath "DentaPro-Windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DentaPro-Windows-x64
          path: DentaPro-Windows-x64.zip
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DentaPro v1.0.${{ github.run_number }}"
          body: |
            ## DentaPro - Zubarska Ordinacija
            1. Preuzmi DentaPro-Windows-x64.zip
            2. Raspakuj ZIP
            3. Pokreni DentaPro.exe
          files: DentaPro-Windows-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
