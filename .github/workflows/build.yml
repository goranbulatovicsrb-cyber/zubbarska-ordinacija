name: Build DentaPro Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows Qt6 MSVC
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Clone repository
        shell: cmd
        run: git clone https://github.com/%GITHUB_REPOSITORY%.git .

      - name: Install Qt
        shell: powershell
        run: |
          python -m pip install --upgrade pip --quiet
          pip install aqtinstall --quiet
          python -m aqt install-qt windows desktop 6.5.3 win64_msvc2019_64 --outputdir C:\Qt

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -B build -S . -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=C:\Qt\6.5.3\msvc2019_64
          cd build
          nmake

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "pkg"
          Copy-Item "build\DentaPro.exe" "pkg\"
          $env:PATH += ";C:\Qt\6.5.3\msvc2019_64\bin"
          & "C:\Qt\6.5.3\msvc2019_64\bin\windeployqt.exe" --release --no-translations --sql "pkg\DentaPro.exe"
          $sql = "C:\Qt\6.5.3\msvc2019_64\plugins\sqldrivers\qsqlite.dll"
          New-Item -ItemType Directory -Force -Path "pkg\sqldrivers"
          if (Test-Path $sql) { Copy-Item $sql "pkg\sqldrivers\" -Force; Write-Host "SQLite OK" }
          Compress-Archive -Path "pkg\*" -DestinationPath "DentaPro-Windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DentaPro-Windows-x64
          path: DentaPro-Windows-x64.zip
          retention-days: 30

      - name: Create Release
        shell: powershell
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v1.0.${{ github.run_number }}"
          gh release create $tag "DentaPro-Windows-x64.zip" `
            --repo $env:GITHUB_REPOSITORY `
            --title "DentaPro $tag" `
            --notes "Preuzmi ZIP, raspakuj, pokreni DentaPro.exe"
