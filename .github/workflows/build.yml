name: Build DentaPro Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (Qt6 + MSVC)
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: cmake -B build -S . -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: |
          cd build
          nmake

      - name: Prepare release package
        shell: powershell
        run: |
          # Create output folder
          New-Item -ItemType Directory -Force -Path "release_package"
          
          # Copy the EXE
          Copy-Item "build\DentaPro.exe" "release_package\"
          
          # Run windeployqt to copy all required Qt DLLs
          windeployqt `
            --release `
            --no-translations `
            --no-system-d3d-compiler `
            --no-opengl-sw `
            --sql `
            "release_package\DentaPro.exe"
          
          # Extra: manually ensure sqldrivers/qsqlite.dll is present
          $pluginDirs = @(
            "${{ env.Qt6_DIR }}\plugins\sqldrivers",
            "${{ env.QT_ROOT_DIR }}\plugins\sqldrivers",
            "${{ env.Qt6_DIR }}\..\plugins\sqldrivers"
          )
          $dest = "release_package\sqldrivers"
          New-Item -ItemType Directory -Force -Path $dest
          
          foreach ($dir in $pluginDirs) {
            Write-Host "Checking: $dir"
            if (Test-Path "$dir\qsqlite.dll") {
              Write-Host "Found qsqlite.dll in $dir"
              Copy-Item "$dir\qsqlite.dll" $dest -Force
              break
            }
          }
          
          # Also try to find it anywhere in Qt installation
          $qtRoot = Split-Path -Parent "${{ env.Qt6_DIR }}"
          $sqliteFiles = Get-ChildItem -Path $qtRoot -Recurse -Filter "qsqlite.dll" -ErrorAction SilentlyContinue
          foreach ($f in $sqliteFiles) {
            Write-Host "Found: $($f.FullName)"
            Copy-Item $f.FullName $dest -Force
          }
          
          # Verify
          Write-Host "=== release_package contents ==="
          Get-ChildItem "release_package" -Recurse | Select-Object FullName
          
          # Check sqlite is there
          if (!(Test-Path "release_package\sqldrivers\qsqlite.dll")) {
            Write-Host "WARNING: qsqlite.dll not found - SQL features may not work"
          } else {
            Write-Host "OK: qsqlite.dll present"
          }

      - name: Add info file
        shell: powershell
        run: |
          @"
          DentaPro v1.0 - Sistem za upravljanje zubarskom ordinacijom
          =============================================================
          
          POKRETANJE: DentaPro.exe
          
          Podaci se cuvaju u:
            %APPDATA%\DentaPro\dentapro.db
          
          Potpisi pacijenata:
            %APPDATA%\DentaPro\signatures\
          
          NAPOMENA: Ne premjestajte ili brisite foldere pored DentaPro.exe
          "@ | Out-File -FilePath "release_package\POKRETANJE.txt" -Encoding utf8

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive -Path "release_package\*" -DestinationPath "DentaPro-Windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DentaPro-Windows-x64
          path: DentaPro-Windows-x64.zip
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DentaPro v1.0.${{ github.run_number }}"
          body: |
            ## DentaPro - Zubarska Ordinacija
            
            ### Instalacija:
            1. Preuzmi `DentaPro-Windows-x64.zip`
            2. Raspakuj ZIP u npr. `C:\DentaPro\`
            3. Pokreni `DentaPro.exe`
            
            > Ne trebas instalirati Qt - sve je ukljuceno u ZIP.
          files: DentaPro-Windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
