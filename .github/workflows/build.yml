name: Build DentaPro Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows (Qt6 + MSVC)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt 6.5
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: cmake -B build -S . -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

      - name: Build
        run: |
          cd build
          nmake

      - name: Deploy Qt runtime
        run: |
          New-Item -ItemType Directory -Force -Path "release_package"
          Copy-Item "build\DentaPro.exe" "release_package\"
          windeployqt --release --no-translations --no-system-d3d-compiler --no-opengl-sw "release_package\DentaPro.exe"

      - name: Ensure SQLite plugin present
        run: |
          $sqldrivers = "${{ env.Qt6_DIR }}\plugins\sqldrivers"
          $dest = "release_package\sqldrivers"
          if (!(Test-Path $dest)) { New-Item -ItemType Directory -Path $dest }
          if (Test-Path "$sqldrivers\qsqlite.dll") {
            Copy-Item "$sqldrivers\qsqlite.dll" $dest
          }

      - name: Create ZIP archive
        run: Compress-Archive -Path "release_package\*" -DestinationPath "DentaPro-Windows-x64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DentaPro-Windows-x64
          path: DentaPro-Windows-x64.zip
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "DentaPro v1.0.${{ github.run_number }}"
          body: |
            ## DentaPro
            1. Preuzmi DentaPro-Windows-x64.zip
            2. Raspakuj ZIP
            3. Pokreni DentaPro.exe
          files: DentaPro-Windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
